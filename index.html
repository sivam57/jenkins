<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        section {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        input, select {
            padding: 8px;
            margin: 5px;
            width: 95%;
        }
        button {
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>College Management System</h1>
</header>

<nav>
    <a href="#students">Students</a>
    <a href="#teachers">Teachers</a>
    <a href="#courses">Courses</a>
</nav>

<section id="students">
    <div class="card">
        <h2>Student Registration</h2>
        <form>
            <input type="text" placeholder="Student Name" required><br>
            <input type="text" placeholder="Roll Number" required><br>
            <input type="email" placeholder="Email" required><br>
            <button type="submit">Add Student</button>
        </form>
    </div>
</section>

<section id="teachers">
    <div class="card">
        <h2>Teacher Registration</h2>
        <form>
            <input type="text" placeholder="Teacher Name" required><br>
            <input type="text" placeholder="Department" required><br>
            <input type="email" placeholder="Email" required><br>
            <button type="submit">Add Teacher</button>
        </form>
    </div>
</section>

<section id="courses">
    <div class="card">
        <h2>Add Course</h2>
        <form>
            <input type="text" placeholder="Course Name" required><br>
            <input type="text" placeholder="Course Code" required><br>
            <select>
                <option>Select Department</option>
                <option>Computer Science</option>
                <option>Mechanical</option>
                <option>Electrical</option>
            </select><br>
            <button type="submit">Add Course</button>
        </form>
    </div>
</section>

</body>
</html>
