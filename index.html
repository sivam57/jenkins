<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple E-Commerce</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    .price {
      color: green;
      font-size: 20px;
      margin: 10px 0;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <header>
    <h1>My E-Commerce Store</h1>
  </header>

  <section class="products">

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Product">
      <h2>Product 1</h2>
      <p class="price">$9</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Product">
      <h2>Product 2</h2>
      <p class="price">$49</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Product">
      <h2>Product 3</h2>
      <p class="price">$99</p>
      <button>Add to Cart</button>
    </div>

  </section>

</body>
</html>
